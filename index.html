// ── PLAYER CONSTANTS ──────────────────────────────────────────────────────────
const PW=22, PH=28, PH_SLIDE=13;
const GRAV=0.58, JUMP=-13, WJ_VX=7.5, WJ_VY=-11.5;
const RUN=5.2, SLIDE_SPD=8.5, ACCEL=0.85, FRIC=0.76, AIR_FRIC=0.92;
const DIVE_VY=20, DIVE_BOUNCE=-17, MAX_FALL=22;

// ── STATE ─────────────────────────────────────────────────────────────────────
let state='menu', levelIdx=0, timer=0;
let bestTimes=Array(LEVELS.length).fill(null);
let p={}, camX=0, camY=0;
let mpTimers=[];

function resetPlayer(){
  const lv=LEVELS[levelIdx];
  p={x:lv.spawn.x,y:lv.spawn.y,vx:0,vy:0,w:PW,h:PH,
     onGround:false,onWall:0,sliding:false,diving:false,
     diveBounce:false,coyote:0,jumpBuf:0,wjLock:0,facing:1};
  mpTimers=lv.movingPlats.map(()=>0);
}

function getAllPlats(){
  const lv=LEVELS[levelIdx];
  const moving=lv.movingPlats.map((mp,i)=>{
    const t=mpTimers[i];
    let x=mp.x0!==undefined?mp.x0:mp.x;
    let y=mp.y0!==undefined?mp.y0:mp.y;
    if(mp.dx) x+=Math.sin(t*mp.dx*0.04)*mp.range;
    if(mp.dy) y+=Math.sin(t*mp.dy*0.04)*mp.range;
    return {x,y,w:mp.w,h:mp.h};
  });
  return [...lv.platforms,...moving];
}

function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

function resolve(plats){
  // X
  p.x+=p.vx; p.onWall=0;
  for(const pl of plats){
    if(rectsOverlap(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h)){
      if(p.vx>0){p.x=pl.x-p.w;p.onWall=1;}
      else if(p.vx<0){p.x=pl.x+pl.w;p.onWall=-1;}
      p.vx=0;
    }
  }
  // Y
  p.vy=Math.min(p.vy,MAX_FALL);
  p.y+=p.vy; p.onGround=false;
  for(const pl of plats){
    if(rectsOverlap(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h)){
      if(p.vy>=0){p.y=pl.y-p.h;p.onGround=true;p.diving=false;p.vy=0;}
      else{p.y=pl.y+pl.h;p.vy=0;}
    }
  }
}

let prevJump=false,prevDown=false;

function update(){
  if(state!=='playing')return;
  timer+=1/60;
  const lv=LEVELS[levelIdx];
  mpTimers=mpTimers.map(t=>t+1);

  const left =keys['ArrowLeft'];
  const right=keys['ArrowRight'];
  const jumpK=keys['ArrowUp'];
  const downK=keys['ArrowDown'];
  const jp=jumpK&&!prevJump;
  const dp=downK&&!prevDown;
  prevJump=jumpK; prevDown=downK;

  // slide
  const wantSlide=downK&&p.onGround&&(left||right||Math.abs(p.vx)>2);
  if(wantSlide&&!p.sliding){p.sliding=true;p.y+=(PH-PH_SLIDE);p.h=PH_SLIDE;}
  if(!wantSlide&&p.sliding){
    p.h=PH;p.y-=(PH-PH_SLIDE);
    let blocked=false;
    for(const pl of getAllPlats())if(rectsOverlap(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h)){blocked=true;break;}
    if(blocked){p.h=PH_SLIDE;p.y+=(PH-PH_SLIDE);}else p.sliding=false;
  }

  // horizontal
  if(p.wjLock>0)p.wjLock--;
  const spd=p.sliding?SLIDE_SPD:RUN;
  if(!p.diving){
    if(left&&!p.wjLock){p.vx-=ACCEL;if(p.vx<-spd)p.vx=-spd;p.facing=-1;}
    if(right&&!p.wjLock){p.vx+=ACCEL;if(p.vx>spd)p.vx=spd;p.facing=1;}
    if(!left&&!right)p.vx*=p.onGround?FRIC:AIR_FRIC;
  }

  // gravity
  if(!p.onGround)p.vy+=GRAV;

  // coyote + buffer
  if(p.onGround)p.coyote=8;else if(p.coyote>0)p.coyote--;
  if(jp)p.jumpBuf=10;else if(p.jumpBuf>0)p.jumpBuf--;

  // dive
  if(dp&&!p.onGround&&!p.sliding){
    p.diving=true;p.vy=DIVE_VY;p.vx*=0.3;p.diveBounce=true;
  }

  // jump
  if(p.jumpBuf>0){
    if(p.coyote>0){
      const bvy=(p.diveBounce&&p.onGround)?DIVE_BOUNCE:JUMP;
      p.vy=bvy;p.diveBounce=false;p.coyote=0;p.jumpBuf=0;
      p.sliding=false;
      if(p.h!==PH){p.y-=(PH-PH_SLIDE);p.h=PH;}
    } else if(p.onWall&&!p.onGround){
      p.vy=WJ_VY;p.vx=-p.onWall*WJ_VX;p.wjLock=14;p.jumpBuf=0;p.facing=-p.onWall;
    }
  }

  const plats=getAllPlats();
  resolve(plats);

  // camera
  const tx=p.x+p.w/2-W/2, ty=p.y+p.h/2-H/2;
  camX+=(tx-camX)*0.12; camY+=(ty-camY)*0.12;
  camX=Math.max(0,Math.min(lv.worldW-W,camX));
  camY=Math.max(0,Math.min(500-H,camY));

  // spikes / fall
  for(const sp of lv.spikes){
    if(rectsOverlap(p.x,p.y,p.w,p.h,sp.x,sp.y,sp.w,sp.h)){resetPlayer();return;}
  }
  if(p.y>520){resetPlayer();return;}

  // flag
  const f=lv.flag;
  if(rectsOverlap(p.x,p.y,p.w,p.h,f.x,f.y,20,44)){
    if(!bestTimes[levelIdx]||timer<bestTimes[levelIdx])bestTimes[levelIdx]=timer;
    state=levelIdx<LEVELS.length-1?'complete':'win';
  }
}

// ── DRAW ─────────────────────────────────────────────────────────────────────
function fmt(t){
  const m=Math.floor(t/60).toString().padStart(2,'0');
  const s=(t%60).toFixed(2).padStart(5,'0');
  return m+':'+s;
}

function drawSpike(sp){
  const n=Math.floor(sp.w/15);
  ctx.fillStyle='#e00';
  for(let i=0;i<n;i++){
    const bx=sp.x-camX+i*15,by=sp.y-camY;
    ctx.beginPath();ctx.moveTo(bx,by+sp.h);ctx.lineTo(bx+7.5,by);ctx.lineTo(bx+15,by+sp.h);ctx.fill();
  }
}

function drawFlag(f){
  const sx=f.x-camX,sy=f.y-camY;
  ctx.fillStyle='#222';ctx.fillRect(sx,sy,3,44);
  ctx.fillStyle='#0c0';
  ctx.beginPath();ctx.moveTo(sx+3,sy);ctx.lineTo(sx+22,sy+10);ctx.lineTo(sx+3,sy+20);ctx.fill();
}

function drawPlayer(){
  const sx=p.x-camX,sy=p.y-camY;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.fillRect(sx+3,sy+p.h,p.w-2,6);
  // body
  ctx.fillStyle='#111';
  if(p.sliding){
    ctx.fillRect(sx,sy,p.w,p.h);
  } else {
    ctx.beginPath();
    ctx.roundRect(sx,sy,p.w,p.h,5);
    ctx.fill();
  }
  // eye
  if(!p.sliding){
    ctx.fillStyle='#fff';
    const ex=p.facing>0?sx+13:sx+4;
    ctx.fillRect(ex,sy+7,5,5);
    ctx.fillStyle='#111';
    ctx.fillRect(ex+(p.facing>0?1:-1),sy+8,2,3);
  }
}

function drawMovingPlats(){
  const lv=LEVELS[levelIdx];
  lv.movingPlats.forEach((mp,i)=>{
    const t=mpTimers[i];
    let x=mp.x0!==undefined?mp.x0:mp.x;
    let y=mp.y0!==undefined?mp.y0:mp.y;
    if(mp.dx)x+=Math.sin(t*mp.dx*0.04)*mp.range;
    if(mp.dy)y+=Math.sin(t*mp.dy*0.04)*mp.range;
    ctx.fillStyle='#444';
    ctx.fillRect(x-camX,y-camY,mp.w,mp.h);
    // stripe
    ctx.fillStyle='#666';
    ctx.fillRect(x-camX+4,y-camY,mp.w-8,3);
  });
}

function draw(){
  ctx.fillStyle='#f5f5f0';
  ctx.fillRect(0,0,W,H);

  if(state==='menu'){
    ctx.fillStyle='#111';
    ctx.font='bold 58px Courier New';
    ctx.textAlign='center';
    ctx.fillText('OVO',W/2,130);
    ctx.font='16px Courier New';
    ctx.fillStyle='#444';
    ctx.fillText('← → Move   ↑ Jump   ↓ Slide / Dive',W/2,185);
    ctx.fillText('Wall Jump: jump while touching a wall',W/2,210);
    ctx.fillText('Dive Bounce: dive ↓ in air, then jump on landing',W/2,235);
    ctx.fillText('10 levels of increasing difficulty',W/2,268);
    // button
    ctx.fillStyle='#111';
    roundRect(W/2-70,300,140,48,10);ctx.fill();
    ctx.fillStyle='#f5f5f0';
    ctx.font='bold 22px Courier New';
    ctx.fillText('PLAY',W/2,332);
    c.style.cursor='pointer';
    return;
  }

  if(state==='complete'){
    ctx.fillStyle='#111';
    ctx.font='bold 42px Courier New';
    ctx.textAlign='center';
    ctx.fillText('LEVEL COMPLETE!',W/2,130);
    ctx.font='22px Courier New';
    ctx.fillStyle='#333';
    ctx.fillText(`Level ${levelIdx+1}  —  ${fmt(timer)}`,W/2,185);
    if(bestTimes[levelIdx])ctx.fillText(`Best: ${fmt(bestTimes[levelIdx])}`,W/2,218);
    // rating
    const acc=timer;
    let rating='';
    if(acc<20)rating='⚡ LIGHTNING';
    else if(acc<40)rating='🔥 BLAZING';
    else if(acc<60)rating='👍 SOLID';
    else rating='🐢 KEEP GOING';
    ctx.fillStyle='#111';
    ctx.font='bold 26px Courier New';
    ctx.fillText(rating,W/2,265);
    ctx.fillStyle='#111';
    roundRect(W/2-80,310,160,48,10);ctx.fill();
    ctx.fillStyle='#f5f5f0';
    ctx.font='bold 20px Courier New';
    ctx.fillText('NEXT LEVEL',W/2,342);
    c.style.cursor='pointer';
    return;
  }

  if(state==='win'){
    ctx.fillStyle='#111';
    ctx.font='bold 50px Courier New';
    ctx.textAlign='center';
    ctx.fillText('YOU WIN!',W/2,100);
    ctx.font='16px Courier New';
    ctx.fillStyle='#333';
    LEVELS.forEach((_,i)=>{
      const t=bestTimes[i];
      ctx.fillText(`Level ${i+1}: ${t?fmt(t):'--'}`,W/2,148+i*30);
    });
    ctx.fillStyle='#111';
    roundRect(W/2-70,450,140,44,10);ctx.fill();
    ctx.fillStyle='#f5f5f0';
    ctx.font='bold 20px Courier New';
    ctx.fillText('MENU',W/2,479);
    c.style.cursor='pointer';
    return;
  }

  // ── PLAYING ──
  c.style.cursor='none';
  const lv=LEVELS[levelIdx];

  // static platforms
  ctx.fillStyle='#111';
  for(const pl of lv.platforms){
    ctx.fillRect(pl.x-camX,pl.y-camY,pl.w,pl.h);
  }

  // moving platforms
  drawMovingPlats();

  // spikes
  for(const sp of lv.spikes)drawSpike(sp);

  // flag
  drawFlag(lv.flag);

  // player
  drawPlayer();

  // HUD
  ctx.fillStyle='#111';
  ctx.font='bold 15px Courier New';
  ctx.textAlign='left';
  ctx.fillText(`Level ${levelIdx+1} / ${LEVELS.length}`,14,26);
  ctx.textAlign='right';
  ctx.fillText(fmt(timer),W-14,26);
  if(bestTimes[levelIdx]){
    ctx.font='12px Courier New';
    ctx.fillStyle='#555';
    ctx.fillText(`Best ${fmt(bestTimes[levelIdx])}`,W-14,44);
  }

  // hint fade
  if(timer<5){
    ctx.globalAlpha=Math.max(0,1-timer/4);
    ctx.font='12px Courier New';
    ctx.fillStyle='#777';
    ctx.textAlign='center';
    ctx.fillText('← → Move  ↑ Jump  ↓ Slide/Dive  Wall Jump against walls',W/2,H-14);
    ctx.globalAlpha=1;
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

c.addEventListener('click',e=>{
  const r=c.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  if(state==='menu'){
    if(mx>W/2-70&&mx<W/2+70&&my>300&&my<348){
      levelIdx=0;timer=0;resetPlayer();camX=0;camY=0;state='playing';
    }
  } else if(state==='complete'){
    if(mx>W/2-80&&mx<W/2+80&&my>310&&my<358){
      levelIdx++;timer=0;resetPlayer();camX=0;camY=0;state='playing';
    }
  } else if(state==='win'){
    if(mx>W/2-70&&mx<W/2+70&&my>450&&my<494){state='menu';}
  }
});

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
