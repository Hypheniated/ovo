<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Platformer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Courier New',monospace; overflow:hidden; }
  canvas { border:2px solid #000; display:block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 800, H = 500;

// ── INPUT ──────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── LEVELS ─────────────────────────────────────────────
// Each level: platforms [{x,y,w,h}], spikes [{x,y,w,h,dir}], spawn {x,y}, flag {x,y}
// All coords in world space. Camera follows player.
const LEVELS = [
  // LEVEL 1 — basics
  {
    spawn: {x:60,y:360},
    flag:  {x:1400,y:300},
    platforms: [
      {x:0,   y:400, w:300, h:20},
      {x:350, y:380, w:200, h:20},
      {x:600, y:350, w:200, h:20},
      {x:860, y:320, w:200, h:20},
      {x:1120,y:300, w:200, h:20},
      {x:1350,y:280, w:200, h:20},
      // floor
      {x:-200,y:490, w:2000,h:20},
    ],
    spikes: [
      {x:310,y:480,w:30,h:15},
      {x:560,y:480,w:30,h:15},
    ],
    worldW: 1700,
  },
  // LEVEL 2 — wall jumps
  {
    spawn: {x:40,y:380},
    flag:  {x:1500,y:100},
    platforms: [
      {x:0,   y:420, w:150, h:20},
      {x:200, y:100, w:20,  h:320}, // left wall shaft
      {x:300, y:100, w:20,  h:320}, // right wall shaft
      {x:200, y:100, w:120, h:20},  // top of shaft
      {x:380, y:300, w:150, h:20},
      {x:580, y:100, w:20,  h:220},
      {x:680, y:100, w:20,  h:220},
      {x:580, y:100, w:120, h:20},
      {x:760, y:220, w:150, h:20},
      {x:960, y:100, w:20,  h:140},
      {x:1060,y:100, w:20,  h:140},
      {x:960, y:100, w:120, h:20},
      {x:1140,y:160, w:200, h:20},
      {x:1390,y:80,  w:200, h:20},
      {x:-200,y:490, w:2200,h:20},
    ],
    spikes: [
      {x:380,y:315,w:40,h:15},
      {x:760,y:235,w:40,h:15},
    ],
    worldW: 1800,
  },
  // LEVEL 3 — slide tunnels + dive
  {
    spawn: {x:40,y:340},
    flag:  {x:1600,y:200},
    platforms: [
      {x:0,   y:380, w:200, h:20},
      // low ceiling tunnel (must slide)
      {x:200, y:340, w:300, h:20}, // floor
      {x:200, y:310, w:300, h:15}, // ceiling — gap=30, player normal=28 won't fit, slide=14 fits
      {x:500, y:300, w:150, h:20},
      {x:700, y:260, w:150, h:20},
      // dive pit
      {x:900, y:180, w:80,  h:20},
      {x:1050,y:380, w:80,  h:20}, // bounce target after dive
      {x:1180,y:260, w:150, h:20},
      {x:1380,y:160, w:200, h:20},
      {x:1620,y:180, w:150, h:20},
      {x:-200,y:490, w:2200,h:20},
    ],
    spikes: [
      {x:500, y:465,w:300,h:15},
      {x:860, y:465,w:160,h:15},
    ],
    worldW: 1900,
  },
  // LEVEL 4 — mixed chaos
  {
    spawn: {x:40,y:300},
    flag:  {x:1800,y:60},
    platforms: [
      {x:0,   y:340, w:120, h:20},
      {x:170, y:280, w:80,  h:20},
      {x:300, y:220, w:80,  h:20},
      {x:300, y:190, w:80,  h:15}, // slide tunnel top
      {x:430, y:160, w:100, h:20},
      {x:580, y:200, w:20,  h:160},// wall
      {x:660, y:200, w:20,  h:160},// wall
      {x:580, y:200, w:100, h:20}, // top
      {x:740, y:300, w:100, h:20},
      {x:900, y:240, w:100, h:20},
      {x:1060,y:180, w:100, h:20},
      {x:1220,y:120, w:100, h:20},
      {x:1380,y:200, w:20,  h:180},
      {x:1480,y:200, w:20,  h:180},
      {x:1380,y:200, w:120, h:20},
      {x:1560,y:120, w:120, h:20},
      {x:1730,y:40,  w:150, h:20},
      {x:-200,y:490, w:2400,h:20},
    ],
    spikes: [
      {x:120, y:465,w:40,h:15},
      {x:740, y:315,w:100,h:15},
      {x:1060,y:195,w:100,h:15},
    ],
    worldW: 2100,
  },
  // LEVEL 5 — everything
  {
    spawn: {x:40,y:380},
    flag:  {x:2100,y:80},
    platforms: [
      {x:0,   y:420, w:120, h:20},
      // slide section
      {x:120, y:380, w:200, h:20},
      {x:120, y:352, w:200, h:14},
      {x:320, y:320, w:80,  h:20},
      // wall jump shaft 1
      {x:440, y:140, w:20,  h:200},
      {x:540, y:140, w:20,  h:200},
      {x:440, y:140, w:120, h:20},
      {x:620, y:260, w:120, h:20},
      // gap with spikes
      {x:800, y:200, w:80,  h:20},
      {x:960, y:140, w:80,  h:20},
      // dive section
      {x:1100,y:60,  w:80,  h:20},
      {x:1240,y:340, w:80,  h:20}, // land after dive
      // wall jump shaft 2
      {x:1380,y:100, w:20,  h:260},
      {x:1480,y:100, w:20,  h:260},
      {x:1380,y:100, w:120, h:20},
      // final stretch
      {x:1560,y:180, w:100, h:20},
      {x:1720,y:120, w:100, h:20},
      {x:1880,y:60,  w:100, h:20},
      {x:2060,y:60,  w:150, h:20},
      {x:-200,y:490, w:2700,h:20},
    ],
    spikes: [
      {x:120, y:465,w:300,h:15},
      {x:620, y:275,w:120,h:15},
      {x:740, y:465,w:400,h:15},
      {x:1240,y:355,w:80, h:15},
      {x:1560,y:195,w:100,h:15},
    ],
    worldW: 2400,
  },
];

// ── GAME STATE ─────────────────────────────────────────
let state = 'menu'; // menu | playing | complete | win
let levelIdx = 0;
let timer = 0;
let bestTimes = Array(LEVELS.length).fill(null);

// ── PLAYER ─────────────────────────────────────────────
const PW = 22, PH_NORMAL = 28, PH_SLIDE = 14;
let p = {};

function resetPlayer() {
  const lv = LEVELS[levelIdx];
  p = {
    x: lv.spawn.x, y: lv.spawn.y,
    vx: 0, vy: 0,
    w: PW, h: PH_NORMAL,
    onGround: false,
    onWall: 0,     // -1 left, 1 right, 0 none
    sliding: false,
    diving: false,
    diveBounce: false, // can get extra jump after dive land
    coyote: 0,
    jumpBuffer: 0,
    wallJumpLock: 0,
    facing: 1,
  };
}

// ── PHYSICS CONSTANTS ──────────────────────────────────
const GRAVITY     = 0.55;
const JUMP_FORCE  = -12.5;
const WALLJUMP_VX = 7;
const WALLJUMP_VY = -11;
const RUN_SPEED   = 5;
const SLIDE_SPEED = 8;
const ACCEL       = 0.8;
const FRICTION    = 0.78;
const DIVE_VY     = 18;
const DIVE_BOUNCE_VY = -16;
const MAX_FALL    = 22;

// ── CAMERA ─────────────────────────────────────────────
let camX = 0, camY = 0;

function updateCamera() {
  const lv = LEVELS[levelIdx];
  const tx = p.x + p.w/2 - W/2;
  const ty = p.y + p.h/2 - H/2;
  camX += (tx - camX) * 0.12;
  camY += (ty - camY) * 0.12;
  camX = Math.max(0, Math.min(lv.worldW - W, camX));
  camY = Math.max(0, Math.min(500 - H, camY));
}

// ── COLLISION ──────────────────────────────────────────
function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

function resolvePlayer(plats) {
  const lv = LEVELS[levelIdx];
  // X
  p.x += p.vx;
  p.onWall = 0;
  for (const pl of plats) {
    if (rectsOverlap(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) {
      if (p.vx > 0) { p.x = pl.x - p.w; p.onWall = 1; }
      else if (p.vx < 0) { p.x = pl.x + pl.w; p.onWall = -1; }
      p.vx = 0;
    }
  }

  // Y
  p.vy = Math.min(p.vy, MAX_FALL);
  p.y += p.vy;
  p.onGround = false;
  for (const pl of plats) {
    if (rectsOverlap(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) {
      if (p.vy > 0) {
        p.y = pl.y - p.h;
        p.onGround = true;
        if (p.diveBounce) {
          // give extra bounce on next jump press — handled in update
        }
        p.diving = false;
        p.vy = 0;
      } else if (p.vy < 0) {
        p.y = pl.y + pl.h;
        p.vy = 0;
      }
    }
  }
}

// ── UPDATE ─────────────────────────────────────────────
let prevJump = false;
let prevDown = false;

function update() {
  if (state !== 'playing') return;
  timer += 1/60;

  const lv = LEVELS[levelIdx];
  const left  = keys['ArrowLeft']  || keys['KeyA'];
  const right  = keys['ArrowRight'] || keys['KeyD'];
  const jumpK  = keys['ArrowUp']   || keys['KeyW'];
  const downK  = keys['ArrowDown'] || keys['KeyS'];
  const jumpPressed = jumpK && !prevJump;
  const downPressed = downK && !prevDown;
  prevJump = jumpK;
  prevDown = downK;

  // ── SLIDE ──
  const wantSlide = downK && p.onGround && (left || right || Math.abs(p.vx) > 2);
  if (wantSlide && !p.sliding) {
    p.sliding = true;
    p.h = PH_SLIDE;
    p.y += (PH_NORMAL - PH_SLIDE);
  }
  if (!wantSlide && p.sliding) {
    // check headroom
    p.h = PH_NORMAL;
    p.y -= (PH_NORMAL - PH_SLIDE);
    let blocked = false;
    for (const pl of lv.platforms) {
      if (rectsOverlap(p.x,p.y,p.w,p.h, pl.x,pl.y,pl.w,pl.h)) { blocked=true; break; }
    }
    if (blocked) { p.h = PH_SLIDE; p.y += (PH_NORMAL-PH_SLIDE); } // stay sliding
    else p.sliding = false;
  }

  // ── HORIZONTAL ──
  if (p.wallJumpLock > 0) p.wallJumpLock--;
  const speed = p.sliding ? SLIDE_SPEED : RUN_SPEED;
  if (!p.diving) {
    if (left  && p.wallJumpLock === 0) { p.vx -= ACCEL; if(p.vx<-speed) p.vx=-speed; p.facing=-1; }
    if (right && p.wallJumpLock === 0) { p.vx += ACCEL; if(p.vx> speed) p.vx= speed; p.facing= 1; }
    if (!left && !right) p.vx *= p.onGround ? FRICTION : 0.92;
  }

  // ── GRAVITY ──
  if (!p.onGround) p.vy += GRAVITY;

  // ── COYOTE & JUMP BUFFER ──
  if (p.onGround) p.coyote = 8;
  else if (p.coyote > 0) p.coyote--;
  if (jumpPressed) p.jumpBuffer = 10;
  else if (p.jumpBuffer > 0) p.jumpBuffer--;

  // ── DIVE ──
  if (downPressed && !p.onGround && !p.sliding) {
    p.diving = true;
    p.vy = DIVE_VY;
    p.vx *= 0.3;
    p.diveBounce = true;
  }

  // ── JUMP ──
  if (p.jumpBuffer > 0) {
    // normal / coyote
    if (p.coyote > 0) {
      const bvy = (p.diveBounce && p.onGround) ? DIVE_BOUNCE_VY : JUMP_FORCE;
      p.vy = bvy;
      p.diveBounce = false;
      p.coyote = 0;
      p.jumpBuffer = 0;
      p.sliding = false;
      if (p.h !== PH_NORMAL) { p.y -= (PH_NORMAL-PH_SLIDE); p.h = PH_NORMAL; }
    }
    // wall jump
    else if (p.onWall !== 0 && !p.onGround) {
      p.vy = WALLJUMP_VY;
      p.vx = -p.onWall * WALLJUMP_VX;
      p.wallJumpLock = 14;
      p.jumpBuffer = 0;
      p.facing = -p.onWall;
    }
  }

  resolvePlayer(lv.platforms);
  updateCamera();

  // ── SPIKE / FALL DEATH ──
  for (const sp of lv.spikes) {
    if (rectsOverlap(p.x,p.y,p.w,p.h, sp.x,sp.y,sp.w,sp.h)) { resetPlayer(); return; }
  }
  if (p.y > 520) { resetPlayer(); return; }

  // ── FLAG ──
  const f = lv.flag;
  if (rectsOverlap(p.x,p.y,p.w,p.h, f.x,f.y,20,40)) {
    if (bestTimes[levelIdx] === null || timer < bestTimes[levelIdx]) bestTimes[levelIdx] = timer;
    if (levelIdx < LEVELS.length-1) { state = 'complete'; }
    else { state = 'win'; }
  }
}

// ── DRAW HELPERS ───────────────────────────────────────
function drawFlag(x, y) {
  const sx = x - camX, sy = y - camY;
  ctx.fillStyle = '#000';
  ctx.fillRect(sx, sy, 3, 40);
  ctx.fillStyle = '#e00';
  ctx.beginPath();
  ctx.moveTo(sx+3, sy);
  ctx.lineTo(sx+20, sy+8);
  ctx.lineTo(sx+3, sy+16);
  ctx.fill();
}

function drawSpike(sp) {
  const sx = sp.x - camX, sy = sp.y - camY;
  const count = Math.floor(sp.w / 15);
  ctx.fillStyle = '#e00';
  for (let i=0; i<count; i++) {
    const bx = sx + i*15;
    ctx.beginPath();
    ctx.moveTo(bx, sy+sp.h);
    ctx.lineTo(bx+7.5, sy);
    ctx.lineTo(bx+15, sy+sp.h);
    ctx.fill();
  }
}

function drawPlayer() {
  const sx = p.x - camX, sy = p.y - camY;
  ctx.fillStyle = '#000';
  // body
  ctx.fillRect(sx, sy, p.w, p.h);
  // eyes
  ctx.fillStyle = '#fff';
  const eyeY = sy + 7;
  if (!p.sliding) {
    ctx.fillRect(sx + (p.facing>0?13:4), eyeY, 5, 5);
  }
}

function fmtTime(t) {
  const m = Math.floor(t/60).toString().padStart(2,'0');
  const s = (t%60).toFixed(2).padStart(5,'0');
  return m+':'+s;
}

// ── DRAW ───────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);

  if (state === 'menu') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 52px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('PLATFORMER', W/2, 160);
    ctx.font = '18px Courier New';
    ctx.fillText('Arrow Keys / WASD to move', W/2, 220);
    ctx.fillText('W / Up = Jump   |   Wall Jump against walls', W/2, 248);
    ctx.fillText('S / Down (ground) = Slide   |   S / Down (air) = Dive', W/2, 276);
    ctx.fillText('Dive then Jump = Super Bounce', W/2, 304);
    // play button
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeRect(W/2-80, 350, 160, 50);
    ctx.font = 'bold 24px Courier New';
    ctx.fillText('PLAY', W/2, 383);
    c.style.cursor = 'pointer';
    return;
  }

  if (state === 'win') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WIN!', W/2, 160);
    ctx.font = '20px Courier New';
    ctx.fillText('Best Times:', W/2, 220);
    LEVELS.forEach((_,i) => {
      const t = bestTimes[i];
      ctx.fillText(`Level ${i+1}: ${t ? fmtTime(t) : '--'}`, W/2, 255 + i*32);
    });
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeRect(W/2-80, 420, 160, 50);
    ctx.font = 'bold 22px Courier New';
    ctx.fillText('MENU', W/2, 452);
    c.style.cursor = 'pointer';
    return;
  }

  if (state === 'complete') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 44px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL COMPLETE!', W/2, 150);
    ctx.font = '24px Courier New';
    ctx.fillText(`Level ${levelIdx+1}  —  ${fmtTime(timer)}`, W/2, 210);
    if (bestTimes[levelIdx] !== null)
      ctx.fillText(`Best: ${fmtTime(bestTimes[levelIdx])}`, W/2, 250);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeRect(W/2-90, 310, 180, 55);
    ctx.font = 'bold 24px Courier New';
    ctx.fillText('NEXT LEVEL', W/2, 345);
    c.style.cursor = 'pointer';
    return;
  }

  // ── PLAYING ──
  c.style.cursor = 'none';
  const lv = LEVELS[levelIdx];
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,W,H);

  // platforms
  ctx.fillStyle = '#000';
  for (const pl of lv.platforms) {
    ctx.fillRect(pl.x-camX, pl.y-camY, pl.w, pl.h);
  }

  // spikes
  for (const sp of lv.spikes) drawSpike(sp);

  // flag
  drawFlag(lv.flag.x, lv.flag.y);

  // player
  drawPlayer();

  // HUD
  ctx.fillStyle = '#000';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`Level ${levelIdx+1} / ${LEVELS.length}`, 12, 28);
  ctx.textAlign = 'right';
  ctx.fillText(fmtTime(timer), W-12, 28);
  if (bestTimes[levelIdx] !== null) {
    ctx.font = '13px Courier New';
    ctx.fillText(`Best: ${fmtTime(bestTimes[levelIdx])}`, W-12, 48);
  }
  // controls reminder (fades after 3s)
  if (timer < 4) {
    ctx.globalAlpha = Math.max(0, 1 - timer/3);
    ctx.font = '13px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('← → Move   W Jump   S Slide/Dive   Wall Jump!', W/2, H-16);
    ctx.globalAlpha = 1;
  }
}

// ── CLICK ──────────────────────────────────────────────
c.addEventListener('click', e => {
  const rect = c.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top)  * (H / rect.height);

  if (state === 'menu') {
    if (mx>W/2-80 && mx<W/2+80 && my>350 && my<400) {
      levelIdx = 0; timer = 0;
      resetPlayer(); camX=0; camY=0;
      state = 'playing';
    }
  } else if (state === 'complete') {
    if (mx>W/2-90 && mx<W/2+90 && my>310 && my<365) {
      levelIdx++;
      timer = 0;
      resetPlayer(); camX=0; camY=0;
      state = 'playing';
    }
  } else if (state === 'win') {
    if (mx>W/2-80 && mx<W/2+80 && my>420 && my<470) {
      state = 'menu';
    }
  }
});

// ── LOOP ───────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
